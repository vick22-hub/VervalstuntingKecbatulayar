<style>
:root {

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.page{display:none;animation:fadeUp .35s ease}
.page.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}

.topbar{background:linear-gradient(135deg,var(--primary),var(--primaryDk));color:#fff;padding:16px 20px;position:sticky;top:0;z-index:50}
.topbar .wrap{max-width:540px;margin:0 auto}
.topbar .back{background:none;border:none;color:rgba(255,255,255,.85);font-size:13px;cursor:pointer;font-family:inherit;padding:0;margin-bottom:6px;display:flex;align-items:center;gap:4px}
.topbar .back:hover{color:#fff}
.topbar h2{font-size:18px;font-weight:800}
.topbar .sub{font-size:12px;opacity:.75;margin-top:2px}

.container{max-width:540px;margin:0 auto;padding:16px 20px 40px}

/* HOME */
.hero{text-align:center;color:#fff;padding:50px 20px 30px}
.hero .icon{font-size:64px;margin-bottom:12px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.2))}
.hero h1{font-size:26px;font-weight:800;letter-spacing:-.5px}
.hero p{font-size:13px;opacity:.8;margin-top:6px}

.input-card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:12px}
.input-card label{font-size:12px;font-weight:600;color:var(--text2);display:block;margin-bottom:6px}
.input-card input,.input-card select{width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid var(--border);font-size:14px;font-family:inherit;outline:none;background:#f8fafc;transition:border .2s}
.input-card input:focus,.input-card select:focus{border-color:var(--primary);background:#fff}

.desa-card{background:var(--card);border-radius:var(--radius);padding:20px;margin-bottom:12px;box-shadow:var(--shadow);transition:transform .15s,box-shadow .15s;cursor:pointer}
.desa-card:hover{transform:translateY(-2px);box-shadow:var(--shadowLg)}
.desa-card .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.desa-card .name{font-size:18px;font-weight:800}
.desa-card .count{font-size:12px;color:var(--text2);margin-top:2px}
.desa-card .btns{display:flex;gap:8px}
.btn{padding:11px 0;border-radius:10px;border:none;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;transition:transform .1s,opacity .2s;flex:1;text-align:center}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--primary);color:#fff}
.btn-outline{background:#fff;color:var(--primary);border:2px solid var(--primary)}
.btn-green{background:var(--green);color:#fff}
.btn-amber{background:var(--amber);color:#fff}
.btn-full{width:100%;display:block}

/* CHILDREN LIST */
.search-box{width:100%;padding:12px 16px;border-radius:12px;border:1.5px solid var(--border);font-size:14px;font-family:inherit;outline:none;background:#fff;margin-bottom:12px;box-shadow:var(--shadow)}
.search-box:focus{border-color:var(--primary)}

.child-item{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:8px;box-shadow:var(--shadow);cursor:pointer;border-left:4px solid var(--border);transition:transform .12s,border-color .2s}
.child-item:hover{transform:translateX(4px)}
.child-item.done{border-left-color:var(--green)}
.child-item.partial{border-left-color:var(--amber)}
.child-item .row{display:flex;justify-content:space-between;align-items:center}
.child-item .cname{font-size:14px;font-weight:600}
.child-item .meta{font-size:11px;color:var(--text2);margin-top:3px}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge-done{background:var(--greenLt);color:var(--green)}
.badge-partial{background:var(--amberLt);color:var(--amber)}
.badge-empty{background:#f1f5f9;color:var(--text2)}
.progress-bar{height:4px;border-radius:2px;background:#f1f5f9;margin-top:8px;overflow:hidden}
.progress-bar .fill{height:100%;border-radius:2px;transition:width .4s}

/* FORM */

.tab-scroll::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:8px 14px;border-radius:20px;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;background:#fff;color:var(--text);box-shadow:var(--shadow);white-space:nowrap;transition:all .15s}
.tab-btn.active{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(11,99,206,.3)}
.tab-btn .cnt{margin-left:4px;padding:1px 6px;border-radius:10px;font-size:10px}
.tab-btn.active .cnt{background:rgba(255,255,255,.3);color:#fff}
.tab-btn .cnt{background:var(--greenLt);color:var(--green)}

.form-card{background:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-top:4px}
.form-card h3{font-size:16px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid var(--border);font-size:14px;font-family:inherit;outline:none;background:#f8fafc;transition:all .2s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--primary);background:#fff;box-shadow:0 0 0 3px rgba(11,99,206,.08)}
.field input.filled,.field select.filled{background:var(--primaryLt);border-color:rgba(11,99,206,.3)}
.field.conditional-field{border-left:3px solid var(--amber);padding-left:14px;margin-left:4px;animation:slideDown .3s ease}
.field.conditional-field label::before{content:"↳ ";color:var(--amber)}

.nav-btns{display:flex;gap:8px;margin-top:12px}

.save-bar{position:fixed;bottom:0;left:0;right:0;padding:12px 20px;background:#fff;border-top:1px solid var(--border);box-shadow:0 -2px 10px rgba(0,0,0,.06);z-index:50}

.pbar-top{display:flex;align-items:center;gap:8px;margin-top:8px}
.pbar-top .track{flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,.25)}
.pbar-top .track .fill{height:100%;border-radius:2px;background:#fff;transition:width .3s}
.pbar-top .pct{font-size:11px;opacity:.8}

.stat-box{background:#fff;border-radius:12px;padding:14px;text-align:center;box-shadow:var(--shadow)}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;box-shadow:var(--shadowLg);animation:fadeUp .3s ease;color:#fff}

@media print{.no-print{display:none!important}.page{display:block!important}}
</style>
</head>

// ═══════════════════════════════════════════
// STORAGE (localStorage fallback)
// ═══════════════════════════════════════════
function sKey(desa, child) {
  return 'stunting2026_' + desa + '_' + child.replace(/[^a-zA-Z0-9]/g, '_');
}

async function storageGet(key) {
  try {
    if (window.storage) {
      const r = await window.storage.get(key, true);
      return r ? JSON.parse(r.value) : null;
    }
  } catch(e) {}
  try {
    const v = localStorage.getItem(key);
    return v ? JSON.parse(v) : null;
  } catch(e) { return null; }
}

async function storageSet(key, val) {
  const str = JSON.stringify(val);
  try {
    if (window.storage) {
      await window.storage.set(key, str, true);
    }
  } catch(e) {}
  try { localStorage.setItem(key, str); } catch(e) {}
}

function toast(msg, color) {
  const t = document.getElementById('toast');

  t.style.background = color || 'var(--green)';
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 2500);
}

        <div>
          <div class="name">🏘️ Desa ${desa}</div>
          <div class="count">${DESA_DATA[desa].length} balita stunting</div>
        </div>
      </div>
      <div class="btns">
        <button class="btn btn-primary" onclick="openChildren('${desa}')">📝 Input Data</button>
        <button class="btn btn-outline" onclick="openRekap('${desa}')">📊 Rekap</button>
      </div>
    </div>
  `).join('');
}

// ═══════════════════════════════════════════
// CHILDREN LIST
// ═══════════════════════════════════════════
async function openChildren(desa) {
  currentDesa = desa;
  document.getElementById('children-title').textContent = '🏘️ Desa ' + desa;
  document.getElementById('searchChild').value = '';
  await loadChildStatuses(desa);
  renderChildren();
  document.getElementById('children-sub').textContent = DESA_DATA[desa].length + ' balita';
  showPage('children');
}

async function loadChildStatuses(desa) {
  childStatuses = {};
  for (const child of DESA_DATA[desa]) {
    const d = await storageGet(sKey(desa, child));
    if (d) {
      const filled = ALL_KEYS.filter(k => d[k] && d[k] !== '').length;
      childStatuses[child] = { filled, total: ALL_KEYS.length, inputBy: d._inputBy || '' };
    }
  }
}

function renderChildren(filter) {
  const list = DESA_DATA[currentDesa].filter(c => !filter || c.toLowerCase().includes(filter.toLowerCase()));
  document.getElementById('children-list').innerHTML = list.map((child, i) => {
    const s = childStatuses[child];
    const pct = s ? Math.round((s.filled / s.total) * 100) : 0;
    const isDone = pct >= 80;
    const isPartial = pct > 0 && !isDone;
    const cls = isDone ? 'done' : isPartial ? 'partial' : '';
    const badge = isDone ? '<span class="badge badge-done">✓ Lengkap</span>'
                 : isPartial ? '<span class="badge badge-partial">Sebagian</span>'
                 : '<span class="badge badge-empty">Belum Isi</span>';
    const meta = s ? `<div class="meta">${s.filled}/${s.total} field${s.inputBy ? ' • oleh ' + s.inputBy : ''}</div>` : '';
    const bar = pct > 0 ? `<div class="progress-bar"><div class="fill" style="width:${pct}%;background:${isDone?'var(--green)':'var(--amber)'}"></div></div>` : '';
    const idx = DESA_DATA[currentDesa].indexOf(child) + 1;
    return `<div class="child-item ${cls}" onclick="openForm('${currentDesa}','${child.replace(/'/g,"\\'")}')">
      <div class="row"><div><div class="cname">${idx}. ${child}</div>${meta}</div>${badge}</div>${bar}
    </div>`;
  }).join('');
}

function filterChildren() {
  renderChildren(document.getElementById('searchChild').value);
}

// ═══════════════════════════════════════════
// FORM
// ═══════════════════════════════════════════
async function openForm(desa, child) {
  currentDesa = desa;
  currentChild = child;
  activeTab = 0;
  document.getElementById('form-title').textContent = child;
  const d = await storageGet(sKey(desa, child));
  formData = d || {};
  renderForm();
  showPage('form');
}

function renderForm() {
  // Progress
  const filled = ALL_KEYS.filter(k => formData[k] && formData[k] !== '').length;
  const pct = Math.round((filled / ALL_KEYS.length) * 100);
  document.getElementById('form-progress-fill').style.width = pct + '%';
  document.getElementById('form-progress-pct').textContent = pct + '%';

  // Tabs
  document.getElementById('tab-scroll').innerHTML = FIELD_GROUPS.map((g, i) => {
    const gf = g.fields.filter(f => formData[f.key] && formData[f.key] !== '').length;
    const cnt = gf > 0 ? `<span class="cnt">${gf}/${g.fields.length}</span>` : '';
    const shortTitle = g.title.length > 14 ? g.title.slice(0, 14) + '…' : g.title;
    return `<button class="tab-btn ${i === activeTab ? 'active' : ''}" onclick="switchTab(${i})">${g.icon} ${shortTitle}${cnt}</button>`;
  }).join('');

  // Fields
  const group = FIELD_GROUPS[activeTab];
  let html = `<h3>${group.icon} ${group.title}</h3>`;
  group.fields.forEach(f => {
    // Check showIf condition
    if (f.showIf) {
      const parentVal = formData[f.showIf.key] || '';
      if (!f.showIf.val.includes(parentVal)) return; // hide field
    }
    const val = formData[f.key] || '';
    const filledCls = val ? ' filled' : '';
    const conditionalCls = f.showIf ? ' conditional-field' : '';
    if (f.type === 'select') {
      const opts = f.opts.map(o => `<option value="${o}" ${val === o ? 'selected' : ''}>${o || '-- Pilih --'}</option>`).join('');
      html += `<div class="field${conditionalCls}"><label>${f.label}</label><select class="form-input${filledCls}" data-key="${f.key}" onchange="updateField(this)">${opts}</select></div>`;
    } else {
      html += `<div class="field${conditionalCls}"><label>${f.label}</label><input type="${f.type}" class="form-input${filledCls}" data-key="${f.key}" value="${val}" placeholder="${f.ph || ''}" oninput="updateField(this)"></div>`;
    }
  });
  document.getElementById('form-fields').innerHTML = html;

  // Nav buttons
  let nav = '';
  if (activeTab > 0) nav += `<button class="btn btn-outline" style="flex:1" onclick="switchTab(${activeTab - 1})">← Sebelumnya</button>`;
  if (activeTab < FIELD_GROUPS.length - 1) nav += `<button class="btn btn-primary" style="flex:1" onclick="switchTab(${activeTab + 1})">Selanjutnya →</button>`;
  document.getElementById('form-nav').innerHTML = nav;

  // Save button text
  document.getElementById('btn-save').textContent = `💾 Simpan Data (${filled}/${ALL_KEYS.length})`;
}

function switchTab(i) {
  activeTab = i;
  renderForm();
  document.getElementById('tab-scroll').children[i].scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
}

function updateField(el) {
  const changedKey = el.dataset.key;
  formData[changedKey] = el.value;
  el.classList.toggle('filled', !!el.value);
  const filled = ALL_KEYS.filter(k => formData[k] && formData[k] !== '').length;
  const pct = Math.round((filled / ALL_KEYS.length) * 100);
  document.getElementById('form-progress-fill').style.width = pct + '%';
  document.getElementById('form-progress-pct').textContent = pct + '%';
  document.getElementById('btn-save').textContent = `💾 Simpan Data (${filled}/${ALL_KEYS.length})`;

  // Re-render if this field is a parent of a conditional field
  const group = FIELD_GROUPS[activeTab];
  const hasConditional = group.fields.some(f => f.showIf && f.showIf.key === changedKey);
  if (hasConditional) {
    renderForm();
    return;
  }

  // Update tab count
  const visibleFields = group.fields.filter(f => !f.showIf || f.showIf.val.includes(formData[f.showIf.key] || ''));
  const gf = visibleFields.filter(f => formData[f.key] && formData[f.key] !== '').length;
  const tabBtn = document.getElementById('tab-scroll').children[activeTab];
  if (tabBtn) {
    let cnt = tabBtn.querySelector('.cnt');
    if (gf > 0) {
      if (!cnt) { cnt = document.createElement('span'); cnt.className = 'cnt'; tabBtn.appendChild(cnt); }
      cnt.textContent = `${gf}/${visibleFields.length}`;
    } else if (cnt) cnt.remove();
  }
}

async function saveData() {
  const btn = document.getElementById('btn-save');
  btn.textContent = '⏳ Menyimpan...';
  btn.disabled = true;
  const inputBy = document.getElementById('inputBy').value || 'Anonim';
  formData._inputBy = inputBy;
  formData._lastUpdate = new Date().toISOString();
  formData._desa = currentDesa;
  formData._nama = currentChild;
  await storageSet(sKey(currentDesa, currentChild), formData);
  toast('✅ Data berhasil disimpan!', 'var(--green)');
  btn.disabled = false;
  renderForm();
}

async function backToChildren() {
  await loadChildStatuses(currentDesa);
  renderChildren();
  showPage('children');
}

// ═══════════════════════════════════════════
// REKAP
// ═══════════════════════════════════════════
async function openRekap(desa) {
  currentDesa = desa;
  document.getElementById('rekap-title').textContent = '📊 Rekap Desa ' + desa;
  showPage('rekap');
  document.getElementById('rekap-content').innerHTML = '<p style="text-align:center;padding:40px;color:var(--text2)">Memuat data rekap...</p>';

  const allData = {};
  for (const child of DESA_DATA[desa]) {
    const d = await storageGet(sKey(desa, child));
    if (d) allData[child] = d;
  }

  const total = DESA_DATA[desa].length;
  const filled = Object.keys(allData).length;
  const entries = Object.entries(allData);
  const complete = entries.filter(([,d]) => ALL_KEYS.filter(k => d[k] && d[k]!=='').length >= ALL_KEYS.length * 0.8).length;
  const progPct = total > 0 ? Math.round((filled / total) * 100) : 0;

  const count = (key, val) => entries.filter(([,d]) => d[key] === val).length;

  let html = `
    <div class="export-bar no-print">
      <button class="btn btn-green" style="flex:1" onclick="exportExcel('${desa}')">📥 Export Excel</button>
      <button class="btn btn-amber" style="flex:1" onclick="exportExcelIndividu('${desa}')">📄 Excel Per-Anak</button>
      <button class="btn btn-outline" style="flex:1" onclick="window.print()">🖨️ Cetak</button>
    </div>

    <div class="stat-grid">
      <div class="stat-box"><div class="num" style="color:var(--primary)">${total}</div><div class="lbl">Total Balita</div></div>
      <div class="stat-box"><div class="num" style="color:var(--amber)">${filled}</div><div class="lbl">Sudah Diisi</div></div>
      <div class="stat-box"><div class="num" style="color:var(--green)">${complete}</div><div class="lbl">Lengkap ≥80%</div></div>
    </div>

    <div class="rekap-card">
      <h4>📈 Progress Pengisian</h4>
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span style="font-size:13px;font-weight:600">${filled} dari ${total} balita</span>
        <span style="font-size:13px;font-weight:700;color:var(--primary)">${progPct}%</span>
      </div>
      <div style="height:10px;border-radius:5px;background:#f1f5f9;overflow:hidden">
        <div style="height:100%;border-radius:5px;width:${progPct}%;background:linear-gradient(90deg,var(--primary),var(--green));transition:width .5s"></div>
      </div>
    </div>`;

  if (filled > 0) {
    html += `<div class="rekap-card">
      <h4>📋 Ringkasan Data (${filled} anak terisi)</h4>
      ${[
        {l:'Riwayat BBLR',v:count('bblr','Ya'),c:'var(--red)'},
        {l:'Imunisasi Lengkap',v:count('imunisasi','Lengkap'),c:'var(--green)'},
        {l:'Punya BPJS',v:count('ban_bpjs','Ya')+count('ada_bpjs','Ya'),c:'var(--primary)'},
        {l:'Dapat PKH',v:count('ban_pkh','Ya')+count('dapat_pkh','Ya'),c:'var(--amber)'},
        {l:'Kelainan Bawaan',v:count('kelainan','Ada'),c:'var(--red)'},
        {l:'Intervensi MBG',v:count('mbg','Ya'),c:'var(--green)'},
        {l:'Dapat Susu',v:count('susu','Ya'),c:'var(--primary)'},
        {l:'Obat Maltofer',v:count('maltofer','Ya'),c:'var(--amber)'},
      ].map(s => `<div class="stat-row"><span class="slbl">${s.l}</span><span class="sval" style="color:${s.c}">${s.v} / ${filled}</span></div>`).join('')}
    </div>`;
  }

  html += `<div class="rekap-card">
    <h4>👶 Detail Per Anak</h4>
    ${DESA_DATA[desa].map((child, i) => {
      const d = allData[child];
      const fc = d ? ALL_KEYS.filter(k => d[k] && d[k]!=='').length : 0;
      const p = Math.round((fc / ALL_KEYS.length) * 100);
      const meta = d && d._inputBy ? `<div class="dmeta">oleh ${d._inputBy} • ${new Date(d._lastUpdate).toLocaleDateString('id-ID')}</div>` : '';
      const badge = p >= 80 ? '<span class="badge badge-done">'+p+'%</span>'
                   : p > 0 ? '<span class="badge badge-partial">'+p+'%</span>'
                   : '<span class="badge badge-empty">—</span>';
      return `<div class="detail-row"><div><div class="dname">${i+1}. ${child}</div>${meta}</div>${badge}</div>`;
    }).join('')}
  </div>`;

  document.getElementById('rekap-content').innerHTML = html;
}

// ═══════════════════════════════════════════
// EXCEL EXPORT - REKAP PER DESA
// ═══════════════════════════════════════════
async function exportExcel(desa) {
  toast('⏳ Menyiapkan file Excel...', 'var(--primary)');
  const children = DESA_DATA[desa];
  const allData = {};
  for (const child of children) {
    const d = await storageGet(sKey(desa, child));
    if (d) allData[child] = d;
  }

  // Header row
  const headers = ['NO', 'NAMA BALITA', ...ALL_KEYS.map(k => ALL_LABELS[k]), 'PENGISI', 'TANGGAL INPUT'];

  // Data rows
  const rows = children.map((child, i) => {
    const d = allData[child] || {};
    return [
      i + 1,
      child,
      ...ALL_KEYS.map(k => d[k] || ''),
      d._inputBy || '',
      d._lastUpdate ? new Date(d._lastUpdate).toLocaleDateString('id-ID') : ''
    ];
  });

  const wb = XLSX.utils.book_new();

  // Sheet 1 - Data Lengkap
  const wsData = [headers, ...rows];
  const ws = XLSX.utils.aoa_to_sheet(wsData);

  // Column widths
  ws['!cols'] = headers.map((h, i) => ({ wch: i === 0 ? 5 : i === 1 ? 30 : Math.max(h.length + 2, 15) }));

  // Style header (bold via cell formatting not supported in community XLSX, but we set it via merge info)
  XLSX.utils.book_append_sheet(wb, ws, 'Data Lengkap');

  // Sheet 2 - Ringkasan
  const entries = Object.entries(allData);
  const total = children.length;
  const filled = entries.length;
  const complete = entries.filter(([,d]) => ALL_KEYS.filter(k => d[k]&&d[k]!=='').length >= ALL_KEYS.length*0.8).length;
  const cnt = (key, val) => entries.filter(([,d]) => d[key] === val).length;

  const summaryData = [
    ['REKAP VERVAL STUNTING 2026 - DESA ' + desa.toUpperCase()],
    [''],
    ['RINGKASAN', 'JUMLAH'],
    ['Total Balita Stunting', total],
    ['Data Sudah Diisi', filled],
    ['Data Lengkap (≥80%)', complete],
    ['Data Belum Diisi', total - filled],
    [''],
    ['INDIKATOR KESEHATAN', 'YA', 'TIDAK/LAINNYA'],
    ['Riwayat BBLR', cnt('bblr','Ya'), cnt('bblr','Tidak')],
    ['Imunisasi Lengkap', cnt('imunisasi','Lengkap'), filled - cnt('imunisasi','Lengkap')],
    ['Kelainan Bawaan', cnt('kelainan','Ada'), cnt('kelainan','Tidak Ada')],
    ['Mantoux Positif', cnt('mantoux','Positif'), cnt('mantoux','Negatif')],
    ['Dapat Susu', cnt('susu','Ya'), cnt('susu','Tidak')],
    ['Obat Maltofer', cnt('maltofer','Ya'), cnt('maltofer','Tidak')],
    ['Intervensi MBG', cnt('mbg','Ya'), cnt('mbg','Tidak')],
    [''],
    ['STATUS BANTUAN', 'YA', 'TIDAK'],
    ['BPJS', cnt('ban_bpjs','Ya')+cnt('ada_bpjs','Ya'), cnt('ban_bpjs','Tidak')+cnt('ada_bpjs','Tidak')],
    ['PKH', cnt('ban_pkh','Ya')+cnt('dapat_pkh','Ya'), cnt('ban_pkh','Tidak')+cnt('dapat_pkh','Tidak')],
    ['BPNT', cnt('ban_bpnt','Ya'), cnt('ban_bpnt','Tidak')],
    [''],
    ['PROGRESS PER ANAK', 'STATUS', '% TERISI', 'PENGISI'],
    ...children.map((child, i) => {
      const d = allData[child];
      const fc = d ? ALL_KEYS.filter(k => d[k]&&d[k]!=='').length : 0;
      const p = Math.round((fc / ALL_KEYS.length) * 100);
      return [child, p >= 80 ? 'Lengkap' : p > 0 ? 'Sebagian' : 'Belum', p + '%', d?._inputBy || ''];
    })
  ];

  const ws2 = XLSX.utils.aoa_to_sheet(summaryData);
  ws2['!cols'] = [{ wch: 30 }, { wch: 15 }, { wch: 15 }, { wch: 20 }];
  XLSX.utils.book_append_sheet(wb, ws2, 'Ringkasan');

  XLSX.writeFile(wb, `Rekap_Stunting_${desa}_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('✅ File Excel berhasil diunduh!', 'var(--green)');
}

// ═══════════════════════════════════════════
// EXCEL EXPORT - PER INDIVIDU (FORMAT FORM)
// ═══════════════════════════════════════════
async function exportExcelIndividu(desa) {
  toast('⏳ Menyiapkan file Excel per-anak...', 'var(--primary)');
  const children = DESA_DATA[desa];
  const wb = XLSX.utils.book_new();

  for (const child of children) {
    const d = await storageGet(sKey(desa, child)) || {};
    const rows = [
      ['FORM VERVAL STUNTING 2026'],
      ['Desa: ' + desa],
      ['Nama Balita: ' + child],
      ['Tanggal Input: ' + (d._lastUpdate ? new Date(d._lastUpdate).toLocaleDateString('id-ID') : '-')],
      ['Pengisi: ' + (d._inputBy || '-')],
      ['']
    ];

    FIELD_GROUPS.forEach(g => {
      rows.push([g.icon + ' ' + g.title.toUpperCase()]);
      g.fields.forEach(f => {
        rows.push([f.label, d[f.key] || '-']);
      });
      rows.push(['']);
    });

    const sheetName = child.slice(0, 28).replace(/[\\\/\?\*\[\]]/g, '');
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [{ wch: 35 }, { wch: 30 }];
    XLSX.utils.book_append_sheet(wb, ws, sheetName);
  }

  XLSX.writeFile(wb, `Form_Individu_Stunting_${desa}_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('✅ File Excel per-anak berhasil diunduh!', 'var(--green)');
}
